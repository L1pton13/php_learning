    <!DOCTYPE html>
    <html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>PHP Калькулятор</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="calculator-container">
            <div class="calculator">
                <div class="display">
                    <input type="text" id="currentInput" readonly placeholder="0">
                </div>
                
                <div class="buttons">
                    <!-- Первый ряд -->
                    <button class="btn func" data-action="ac">AC</button>
                    <button class="btn func" data-action="c">C</button>
                    <button class="btn func" data-action="backspace">⌫</button>
                    <button class="btn operator" data-op="/">÷</button>
                    
                    <!-- Второй ряд -->
                    <button class="btn number" data-num="7">7</button>
                    <button class="btn number" data-num="8">8</button>
                    <button class="btn number" data-num="9">9</button>
                    <button class="btn operator" data-op="*">×</button>
                    
                    <!-- Третий ряд -->
                    <button class="btn number" data-num="4">4</button>
                    <button class="btn number" data-num="5">5</button>
                    <button class="btn number" data-num="6">6</button>
                    <button class="btn operator" data-op="-">-</button>
                    
                    <!-- Четвертый ряд -->
                    <button class="btn number" data-num="1">1</button>
                    <button class="btn number" data-num="2">2</button>
                    <button class="btn number" data-num="3">3</button>
                    <button class="btn operator" data-op="+">+</button>
                    
                    <!-- Пятый ряд -->
                    <button class="btn number" data-num="0">0</button>
                    <button class="btn number" data-num=".">.</button>
                    <button class="btn operator" data-op="^">xʸ</button>
                    <button class="btn operator" data-op="sqrt">√</button>
                    
                    <!-- Шестой ряд -->
                    <button class="btn equals" id="equals">=</button>
                </div>
            </div>
            
            <div class="history-panel">
                <h3>История операций</h3>
                <div id="historyList">
                    <div class="history-empty">Нет операций</div>
                </div>
                <button id="clearHistoryBtn" class="clear-history">Очистить историю</button>
            </div>
        </div>
        
        <script src="script.js"></script>
    </body>
    </html>
